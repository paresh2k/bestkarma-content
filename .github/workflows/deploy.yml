name: Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'published/articles/**'

jobs:
  deploy:
    name: Trigger Vercel rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
