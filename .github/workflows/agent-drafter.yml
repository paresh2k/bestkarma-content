name: Agent 1 — Drafter

# Triggers on manual dispatch or when draft files are pushed
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'drafts/*/*.md'

jobs:
  draft:
    name: Draft briefed articles with Claude
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Check for briefed articles
        id: detect
        run: |
          COUNT=0
          for file in drafts/*/*.md; do
            [ -f "$file" ] || continue
            STATUS=$(grep "^status:" "$file" | awk '{print $2}' | tr -d '\r')
            if [ "$STATUS" = "briefed" ]; then
              COUNT=$((COUNT + 1))
            fi
          done
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT briefed article(s)."

      - name: Draft articles with Claude
        if: steps.detect.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          MAX_ARTICLES: '10'
        run: |
          node pipelines/agent-drafter.mjs

      - name: Commit drafted articles
        if: steps.detect.outputs.count != '0'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "BestKarma Drafter Bot"
          git config user.email "drafter@bestkarma.com"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/paresh2k/bestkarma-content.git
          git add drafts/
          if git diff --staged --quiet; then
            echo "Nothing to commit — no articles were drafted."
          else
            git commit -m "Auto-draft: batch of up to 10 articles"
            git push
          fi
