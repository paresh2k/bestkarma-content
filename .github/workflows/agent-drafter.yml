name: Agent 1 — Drafter

# Triggers when draft files are pushed with status: briefed
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'drafts/*/*.md'

jobs:
  draft:
    name: Draft briefed articles with Claude
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Detect briefed articles
        id: detect
        run: |
          SLUGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — scan ALL drafts for status: briefed
            echo "Manual trigger — scanning all drafts for briefed articles..."
            for file in drafts/*/*.md; do
              [ -f "$file" ] || continue
              STATUS=$(grep "^status:" "$file" | awk '{print $2}' | tr -d '\r')
              if [ "$STATUS" = "briefed" ]; then
                SLUG=$(basename "$file" .md)
                SLUGS="$SLUGS $SLUG"
                echo "Briefed article found: $SLUG"
              fi
            done
          else
            # Push trigger — only look at files changed in this push
            CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'drafts/*/*.md' || true)
            for file in $CHANGED; do
              [ -f "$file" ] || continue
              STATUS=$(grep "^status:" "$file" | awk '{print $2}' | tr -d '\r')
              if [ "$STATUS" = "briefed" ]; then
                SLUG=$(basename "$file" .md)
                SLUGS="$SLUGS $SLUG"
                echo "Briefed article detected: $SLUG"
              fi
            done
          fi
          SLUGS=$(echo "$SLUGS" | xargs)
          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT
          if [ -z "$SLUGS" ]; then
            echo "No briefed articles found — skipping."
          fi

      - name: Draft articles with Claude
        if: steps.detect.outputs.slugs != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          node pipelines/agent-drafter.mjs

      - name: Commit drafted articles
        if: steps.detect.outputs.slugs != ''
        run: |
          git config user.name "BestKarma Drafter Bot"
          git config user.email "drafter@bestkarma.com"
          git add drafts/
          if git diff --staged --quiet; then
            echo "Nothing to commit — no articles were drafted."
          else
            git commit -m "Auto-draft: ${{ steps.detect.outputs.slugs }}"
            git push
          fi
