name: Agent 3 — Validator

# Triggers after Agent 1 or Agent 2 bot commits (workflow_run bypasses GITHUB_TOKEN restriction)
# Also triggers on human pushes to drafts/ — but skips them (Agent 2 handles those first)
on:
  workflow_run:
    workflows: ["Agent 1 — Drafter", "Agent 2 — Editor"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'drafts/*/*.md'

jobs:
  validate:
    name: Validate drafted articles with GPT-4o-mini
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if this is a bot push
        id: check
        run: |
          AUTHOR=$(git log -1 --format='%an')
          echo "Commit author: $AUTHOR"
          if [[ "$AUTHOR" == *"Bot"* ]]; then
            echo "Bot push — Agent 3 will validate."
            echo "is_bot=true" >> $GITHUB_OUTPUT
          else
            echo "Human push — Agent 2 will review first. Agent 3 skipping."
            echo "is_bot=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.is_bot == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        if: steps.check.outputs.is_bot == 'true'
        run: npm install --ignore-scripts

      - name: Find drafted articles not yet in validated/
        if: steps.check.outputs.is_bot == 'true'
        id: detect
        run: |
          SLUGS=""
          for pillar in longevity sleep nutrition mind-body wellness; do
            for file in drafts/$pillar/*.md; do
              [ -f "$file" ] || continue
              STATUS=$(grep "^status:" "$file" | awk '{print $2}' | tr -d '\r')
              if [ "$STATUS" = "drafted" ]; then
                SLUG=$(basename "$file" .md)
                if [ ! -f "validated/articles/$SLUG.md" ]; then
                  SLUGS="$SLUGS $SLUG"
                  echo "Needs validation: $SLUG"
                fi
              fi
            done
          done
          SLUGS=$(echo "$SLUGS" | xargs)
          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT
          if [ -z "$SLUGS" ]; then
            echo "No unvalidated drafted articles found."
          fi

      - name: Validate articles with GPT-4o-mini
        if: steps.check.outputs.is_bot == 'true' && steps.detect.outputs.slugs != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          for slug in ${{ steps.detect.outputs.slugs }}; do
            echo "Validating: $slug"
            node pipelines/agent-validator.mjs "$slug"
          done

      - name: Commit validation results
        if: steps.check.outputs.is_bot == 'true' && steps.detect.outputs.slugs != ''
        run: |
          git config user.name "BestKarma Validator Bot"
          git config user.email "validator@bestkarma.com"
          git add drafts/ validated/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Auto-validate: ${{ steps.detect.outputs.slugs }}"
            git push
          fi
