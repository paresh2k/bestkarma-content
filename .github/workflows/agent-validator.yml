name: Agent 3 — Validator

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Agent 1 — Drafter", "Agent 2 — Editor"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'drafts/*/*.md'

concurrency:
  group: agent-validator
  cancel-in-progress: false

jobs:
  validate:
    name: Validate drafted articles with GPT-4o-mini
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Check if this is a bot push
        id: check
        run: |
          AUTHOR=$(git log -1 --format='%an')
          echo "Commit author: $AUTHOR"
          if [[ "$AUTHOR" == *"Bot"* ]]; then
            echo "Bot push — Agent 3 will validate."
            echo "is_bot=true" >> $GITHUB_OUTPUT
          else
            echo "Human push — Agent 2 will review first. Agent 3 skipping."
            echo "is_bot=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.is_bot == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        if: steps.check.outputs.is_bot == 'true'
        run: npm install --ignore-scripts

      - name: Find drafted articles not yet in validated/
        if: steps.check.outputs.is_bot == 'true'
        id: detect
        run: |
          COUNT=0
          for pillar in longevity sleep nutrition mind-body wellness; do
            for file in drafts/$pillar/*.md; do
              [ -f "$file" ] || continue
              STATUS=$(grep "^status:" "$file" | awk '{print $2}' | tr -d '\r')
              if [ "$STATUS" = "drafted" ]; then
                SLUG=$(basename "$file" .md)
                if [ ! -f "validated/articles/$SLUG.md" ]; then
                  COUNT=$((COUNT + 1))
                  echo "Needs validation: $SLUG"
                fi
              fi
            done
          done
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" = "0" ]; then
            echo "No unvalidated drafted articles found."
          fi

      - name: Validate articles with GPT-4o-mini
        if: steps.check.outputs.is_bot == 'true' && steps.detect.outputs.count != '0'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node pipelines/agent-validator.mjs

      - name: Commit validation results
        if: steps.check.outputs.is_bot == 'true' && steps.detect.outputs.count != '0'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "BestKarma Validator Bot"
          git config user.email "validator@bestkarma.com"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/paresh2k/bestkarma-content.git
          git pull --rebase
          git add drafts/ validated/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Auto-validate: batch"
            git push
          fi
