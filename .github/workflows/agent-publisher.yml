name: Agent 4 — Auto-Publisher

on:
  workflow_run:
    workflows: ["Agent 3 — Validator"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'validated/articles/**.md'

concurrency:
  group: agent-publisher
  cancel-in-progress: false

jobs:
  publish:
    name: Promote validated → published
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Find validated articles not yet published
        id: detect
        run: |
          COUNT=0
          for file in validated/articles/*.md; do
            [ -f "$file" ] || continue
            SLUG=$(basename "$file" .md)
            if [ ! -f "published/articles/$SLUG.md" ]; then
              COUNT=$((COUNT + 1))
              echo "Needs publishing: $SLUG"
            fi
          done
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" = "0" ]; then
            echo "No unpublished validated articles found."
          fi

      - name: Promote all unpublished articles
        if: steps.detect.outputs.count != '0'
        run: node pipelines/promote-article.mjs

      - name: Commit and push
        if: steps.detect.outputs.count != '0'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "BestKarma Publisher Bot"
          git config user.email "actions@bestkarma.com"
          git remote set-url origin https://x-access-token:${PAT_TOKEN}@github.com/paresh2k/bestkarma-content.git
          git pull --rebase
          git add published/
          if git diff --staged --quiet; then
            echo "Nothing to commit — already up to date."
          else
            git commit -m "Auto-publish: batch"
            git push
          fi

      - name: Trigger Vercel deploy
        if: steps.detect.outputs.count != '0'
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
