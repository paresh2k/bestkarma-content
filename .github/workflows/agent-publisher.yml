name: Agent 4 — Auto-Publisher

on:
  push:
    branches: [main]
    paths:
      - 'validated/articles/**.md'

jobs:
  publish:
    name: Promote validated → published
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Detect changed validated articles
        id: detect
        run: |
          SLUGS=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'validated/articles/*.md' | sed 's|validated/articles/||;s|\.md$||' | tr '\n' ' ' | xargs)
          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT
          if [ -n "$SLUGS" ]; then
            echo "Articles to publish: $SLUGS"
          else
            echo "No validated articles changed in this push"
          fi

      - name: Promote each article
        if: steps.detect.outputs.slugs != ''
        run: |
          FAILED=""
          for slug in ${{ steps.detect.outputs.slugs }}; do
            echo "Promoting: $slug"
            if node pipelines/promote-article.mjs "$slug"; then
              echo "✓ $slug promoted"
            else
              echo "✗ $slug failed — check validated/$slug.bundle/ exists"
              FAILED="$FAILED $slug"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Promotion failed for:$FAILED"
            exit 1
          fi

      - name: Commit and push
        if: steps.detect.outputs.slugs != ''
        run: |
          git config user.name "BestKarma Publisher Bot"
          git config user.email "actions@bestkarma.com"
          git add published/
          if git diff --staged --quiet; then
            echo "Nothing to commit — already up to date"
          else
            git commit -m "Auto-publish: ${{ steps.detect.outputs.slugs }}"
            git push
          fi

      - name: Trigger Vercel deploy
        if: steps.detect.outputs.slugs != ''
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
