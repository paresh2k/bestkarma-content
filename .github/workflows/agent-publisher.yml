name: Agent 4 — Auto-Publisher

# Triggers when validated articles are added or updated
on:
  push:
    branches: [main]
    paths:
      - 'validated/articles/**.md'

jobs:
  publish:
    name: Promote validated → published
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to diff against

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed validated articles
        id: detect
        run: |
          # Find .md files added or modified in validated/articles/ in this push
          SLUGS=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'validated/articles/*.md' \
            | sed 's|validated/articles/||;s|\.md$||' \
            | tr '\n' ' ' \
            | xargs)
          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT
          if [ -n "$SLUGS" ]; then
            echo "Articles to publish: $SLUGS"
          else
            echo "No validated articles changed — nothing to publish"
          fi

      - name: Promote each article
        if: steps.detect.outputs.slugs != ''
        run: |
          FAILED=""
          for slug in ${{ steps.detect.outputs.slugs }}; do
            echo "→ Promoting: $slug"
            if node pipelines/promote-article.mjs "$slug"; then
              echo "  ✓ $slug promoted successfully"
            else
              echo "  ✗ $slug failed — check bundle files exist in validated/$slug.bundle/"
              FAILED="$FAILED $slug"
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Promotion failed for:$FAILED"
            exit 1
          fi

      - name: Commit promoted articles
        if: steps.detect.outputs.slugs != ''
        run: |
          git config user.name "BestKarma Publisher Bot"
          git config user.email "actions@bestkarma.com"
          git add published/
          if git diff --staged --quiet; then
            echo "Nothing new to commit — articles already up to date in published/"
          else
            git commit -m "Auto-publish: ${{ steps.detect.outputs.slugs }}

Promoted by Agent 4 (Auto-Publisher) from validated/articles/."
            git push
          fi

      - name: Trigger Vercel deploy
        if: steps.detect.outputs.slugs != ''
        run: |
          echo "Triggering Vercel rebuild..."
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
          echo "Deploy triggered."
